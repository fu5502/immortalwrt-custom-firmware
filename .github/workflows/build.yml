name: Build custom ImmortalWrt firmware

on:
  workflow_dispatch:
    inputs:
      release:
        description: ImmortalWrt release version
        required: true
        default: 25.12.0
      rootfs_partsize:
        description: Root filesystem partition size in MB
        required: true
        default: "4096"
      imagebuilder_url:
        description: Optional custom ImageBuilder URL
        required: false
        default: ""
  push:
    branches:
      - main
  schedule:
    - cron: "0 20 * * 5"

permissions:
  contents: write

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      RELEASE: ${{ github.event.inputs.release || '25.12.0' }}
      ROOTFS_PARTSIZE: ${{ github.event.inputs.rootfs_partsize || '4096' }}
      IMAGEBUILDER_URL: ${{ github.event.inputs.imagebuilder_url || '' }}
      TARGET_PATH: x86/64
      PROFILE: generic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3-setuptools rsync unzip \
            zlib1g-dev file wget xz-utils zstd curl ca-certificates

      - name: Build firmware
        run: bash scripts/build-imagebuilder.sh

      - name: Prepare release metadata
        run: |
          short_sha="$(printf '%.7s' "$GITHUB_SHA")"
          tag_name="immortalwrt-${RELEASE}-x86-64-rootfs-${ROOTFS_PARTSIZE}m-${short_sha}"
          release_name="ImmortalWrt ${RELEASE} x86/64 custom rootfs ${ROOTFS_PARTSIZE}M (${short_sha})"

          {
            echo "RELEASE_TAG=${tag_name}"
            echo "RELEASE_NAME=${release_name}"
          } >> "$GITHUB_ENV"

          {
            echo "Custom ImmortalWrt firmware for fu5502."
            echo
            echo "- Release: ${RELEASE}"
            echo "- Target: x86/64"
            echo "- Profile: generic"
            echo "- Rootfs partsize: ${ROOTFS_PARTSIZE} MB"
            echo "- Homepage API plugin is embedded from fu5502/luci-app-homepage-api"
            echo
            echo "Files:"
            for file in artifacts/*; do
              echo "- $(basename "$file")"
            done
          } > "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" artifacts/* \
              --title "$RELEASE_NAME" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi
